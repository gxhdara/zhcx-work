<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>促销管理列表 - 原型</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #1890ff;
      --primary-hover: #40a9ff;
      --primary-active: #096dd9;
      --bg-page: #f0f2f5;
      --bg-white: #fff;
      --border: #d9d9d9;
      --text: rgba(0,0,0,.85);
      --text-secondary: rgba(0,0,0,.45);
      --header-bg: #fafafa;
      --row-alt: #fafafa;
      --range-track: #e6f7ff;
      --sidebar-width: 208px;
      --top-height: 48px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg-page);
      min-height: 100vh;
    }
    .layout { display: flex; flex-direction: column; min-height: 100vh; }
    .topbar {
      height: var(--top-height);
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 16px;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,21,41,.08);
    }
    .topbar .logo { font-weight: 600; margin-right: 24px; display: flex; align-items: center; gap: 8px; }
    .topbar .tabs { flex: 1; display: flex; gap: 4px; align-items: flex-end; height: 100%; padding-top: 8px; }
    .top-tab {
      background: rgba(255,255,255,.2);
      padding: 6px 14px 8px;
      border-radius: 4px 4px 0 0;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: default;
    }
    .top-tab.active { background: var(--bg-page); color: var(--primary); }
    .topbar .right { display: flex; align-items: center; gap: 16px; font-size: 13px; }
    .body-row { display: flex; flex: 1; min-height: 0; }
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-white);
      border-right: 1px solid #e8e8e8;
      padding: 12px 0;
      flex-shrink: 0;
    }
    .menu-group-title { padding: 8px 24px; color: var(--text-secondary); font-size: 12px; }
    .menu-item {
      padding: 10px 24px 10px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      transition: background .2s, color .2s;
    }
    .menu-item:hover { background: #f5f5f5; }
    .menu-item.active { background: #e6f7ff; color: var(--primary); border-right: 3px solid var(--primary); }
    .main { flex: 1; padding: 16px; overflow: auto; }
    .card {
      background: var(--bg-white);
      border-radius: 4px;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,.03);
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 16px;
      align-items: flex-end;
      margin-bottom: 12px;
    }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; color: var(--text-secondary); }
    .field input[type="text"] {
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 11px;
      min-width: 160px;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(24,144,255,.2); }
    .tree-select-wrap { position: relative; min-width: 280px; }
    .tree-select-head { display: flex; align-items: center; gap: 0; }
    .tree-select-control {
      min-height: 32px;
      border: 1px solid var(--border);
      border-radius: 4px 0 0 4px;
      padding: 4px 8px;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex: 1;
    }
    .tree-select-side-bulk {
      width: 30px;
      height: 32px;
      border: 1px solid var(--border);
      border-left: none;
      border-radius: 0 4px 4px 0;
      background: #fff;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .tree-select-side-bulk:hover { color: var(--primary); border-color: var(--primary); }
    .tree-select-control.open, .tree-select-control:focus-within { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(24,144,255,.2); }
    .tree-select-control .summary { flex: 1; font-size: 12px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-select-control .summary.has-val { color: var(--text); }
    .tree-toolbar {
      display: flex;
      align-items: center;
      border-bottom: 1px solid #f0f0f0;
      padding: 8px;
    }
    .tree-toolbar .search-wrap {
      width: 100%;
      position: relative;
      display: flex;
      align-items: center;
      border: 1px solid var(--primary);
      border-radius: 4px;
      overflow: hidden;
    }
    .tree-toolbar .search-wrap input {
      width: 100%;
      border: none;
      height: 30px;
      padding: 0 36px 0 10px;
      font-size: 13px;
    }
    .tree-toolbar .search-wrap input:focus { outline: none; }
    .tree-toolbar .search-wrap .ic { position: absolute; right: 10px; color: var(--text-secondary); pointer-events: none; }
    .tree-dropdown {
      display: none;
      position: absolute;
      z-index: 80;
      left: 0;
      top: calc(100% + 4px);
      min-width: 100%;
      width: 400px;
      max-height: 360px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: 0 6px 16px rgba(0,0,0,.12);
      flex-direction: column;
    }
    .tree-dropdown.open { display: flex; }
    .tree-body { overflow-y: auto; max-height: 300px; padding: 4px 0; }
    .tree-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px 6px 0;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
    }
    .tree-row:hover { background: #f5f5f5; }
    .tree-row .tw { width: 18px; text-align: center; color: var(--text-secondary); font-size: 10px; }
    .tree-row .tw.empty { visibility: hidden; }
    .tree-row .cb { accent-color: var(--primary); }
    .tree-indent-0 { padding-left: 8px; }
    .tree-indent-1 { padding-left: 28px; }
    .tree-indent-2 { padding-left: 48px; }
    .range-field { position: relative; min-width: 260px; }
    .range-trigger {
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0 36px 0 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      background: #fff;
      font-size: 13px;
      transition: border-color .2s, box-shadow .2s;
    }
    .range-trigger:hover { border-color: var(--primary); }
    .range-trigger.open {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(24,144,255,.2);
      border-bottom-color: var(--primary);
    }
    .range-trigger .cal-ic { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
    .range-field .range-trigger-wrap { position: relative; }
    .range-popover {
      display: none;
      position: absolute;
      z-index: 90;
      top: calc(100% + 4px);
      left: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: 0 6px 16px rgba(0,0,0,.12);
      width: 640px;
      max-width: 96vw;
    }
    .range-popover.open { display: flex; }
    .range-shortcuts {
      width: 112px;
      border-right: 1px solid #f0f0f0;
      padding: 8px 0;
      flex-shrink: 0;
    }
    .range-shortcuts a {
      display: block;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
    }
    .range-shortcuts a:hover { color: var(--primary); background: #f5f5f5; }
    .range-calendars { flex: 1; padding: 12px; display: flex; gap: 16px; flex-wrap: wrap; }
    .cal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .cal-head button {
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 4px 6px;
      border-radius: 2px;
    }
    .cal-head button:hover { color: var(--primary); background: #f0f5ff; }
    .cal-grid { width: 252px; }
    .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-day {
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      border-radius: 2px;
      cursor: pointer;
      color: var(--text);
    }
    .cal-day.other { color: #bfbfbf; }
    .cal-day:hover:not(.other) { background: #f5f5f5; }
    .cal-day.in-range { background: var(--range-track); }
    .cal-day.start, .cal-day.end { background: var(--primary); color: #fff; font-weight: 600; }
    .cal-day.today { box-shadow: inset 0 0 0 1px var(--primary); }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      height: 32px;
      padding: 0 15px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background .2s, border-color .2s, color .2s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    .btn-default { background: #fff; border-color: var(--border); color: var(--text); }
    .btn-default:hover { color: var(--primary); border-color: var(--primary); }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 12px 0;
      border-top: 1px solid #f0f0f0;
      margin-top: 8px;
    }
    .table-wrap { overflow-x: auto; border: 1px solid #f0f0f0; border-radius: 4px; }
    table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.data th {
      background: var(--header-bg);
      text-align: left;
      padding: 12px 8px;
      border-bottom: 1px solid #f0f0f0;
      font-weight: 600;
      white-space: nowrap;
    }
    table.data td { padding: 10px 8px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    table.data tr:nth-child(even) td { background: var(--row-alt); }
    .link { color: var(--primary); cursor: pointer; text-decoration: none; }
    .link:hover { text-decoration: underline; }
    .name-ru { font-weight: 500; }
    .name-zh { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .act-type-zh { font-size: 13px; }
    .status-tag { display: inline-block; padding: 0 8px; border-radius: 2px; font-size: 12px; line-height: 20px; }
    .status-pending { background: #f0f0f0; color: var(--text-secondary); }
    .status-on { background: #e6f7ff; color: var(--primary); }
    .status-end { background: #fff2e8; color: #fa8c16; }
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #modalBulk { z-index: 1200; }
    #modalJoinConfirm { z-index: 1300; }
    .modal-backdrop.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: 4px;
      min-width: 520px;
      max-width: 900px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      animation: modalIn .2s ease-out;
    }
    .modal.modal-join-tall {
      min-height: 580px;
      max-height: 92vh;
    }
    @keyframes modalIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    .modal-hd {
      padding: 16px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }
    .modal-bd { padding: 16px 24px; overflow: auto; flex: 1; min-height: 0; }
    .modal-ft {
      padding: 10px 16px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      font-size: 13px;
    }
    .pagination-bar select { height: 28px; border-radius: 4px; border: 1px solid var(--border); padding: 0 8px; }
    .page-btns { display: flex; gap: 4px; align-items: center; }
    .page-btns button {
      min-width: 28px; height: 28px; border: 1px solid var(--border); background: #fff; border-radius: 4px; cursor: pointer;
    }
    .page-btns button:hover:not(:disabled) { color: var(--primary); border-color: var(--primary); }
    .page-btns button:disabled { opacity: .45; cursor: not-allowed; }
    .switch-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .switch {
      width: 44px; height: 22px; background: #ccc; border-radius: 11px; position: relative; cursor: pointer; transition: background .2s;
    }
    .switch.on { background: var(--primary); }
    .switch::after {
      content: '';
      position: absolute; width: 18px; height: 18px; background: #fff; border-radius: 50%; top: 2px; left: 2px;
      transition: transform .2s;
    }
    .switch.on::after { transform: translateX(22px); }
    .field.disabled { opacity: .5; pointer-events: none; }
    .join-risk-hint {
      margin-top: 10px;
      margin-bottom: 14px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.65;
      color: #cf1322;
      background: #fff2f0;
      border: 1px solid #ffccc7;
      border-radius: 4px;
    }
    .join-risk-hint .join-risk-title { font-weight: 600; margin-bottom: 6px; }
    .join-risk-hint p { margin: 6px 0 0 0; }
    .join-risk-hint p:first-of-type { margin-top: 0; }
    .join-readonly-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding: 8px 12px;
      background: #fafafa;
      border: 1px solid #f0f0f0;
      border-radius: 4px;
      font-size: 13px;
    }
    .join-readonly-row .lbl { color: var(--text-secondary); white-space: nowrap; }
    .join-readonly-row .val { font-weight: 600; color: var(--text); user-select: text; }
    .guide-tip {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      padding: 8px 12px;
      background: #e6f7ff;
      border: 1px solid #91d5ff;
      border-radius: 4px;
    }
    .modal-sm { min-width: 400px; max-width: 520px; }
    .modal-sm textarea { width: 100%; min-height: 120px; margin-top: 8px; padding: 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="layout">
    <header class="topbar">
      <div class="logo"><i class="fa-solid fa-store"></i> 电商平台运营后台</div>
      <div class="tabs">
        <div class="top-tab">商品管理</div>
        <div class="top-tab active">促销管理 <i class="fa-solid fa-xmark" style="font-size:10px;opacity:.6"></i></div>
      </div>
      <div class="right">
        <span><i class="fa-regular fa-bell"></i></span>
        <span>店铺：Ozon <i class="fa-solid fa-caret-down"></i></span>
        <span>运营用户</span>
      </div>
    </header>
    <div class="body-row">
      <aside class="sidebar">
        <div class="menu-group-title">营销</div>
        <div class="menu-item"><i class="fa-solid fa-box"></i> 商品</div>
        <div class="menu-item"><i class="fa-solid fa-store"></i> 门店</div>
        <div class="menu-item active"><i class="fa-solid fa-gear"></i> 设置</div>
        <div class="menu-item active" style="padding-left:40px;"><i class="fa-solid fa-tags"></i> 促销管理</div>
      </aside>
      <main class="main">
        <div class="card">
          <div class="filter-row">
            <div class="field">
              <label>来源渠道（店铺）</label>
              <div class="tree-select-wrap" id="mainTreeWrap">
                <div class="tree-select-head">
                  <div class="tree-select-control" id="mainTreeCtrl" onclick="toggleMainTree(event)">
                    <span class="summary" id="mainTreeSummary">请选择渠道</span>
                    <i class="fa-solid fa-angle-down" style="color:#999"></i>
                  </div>
                  <button type="button" class="tree-select-side-bulk" title="批量输入" onclick="openBulkModal('main');return false;"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                </div>
                <div class="tree-dropdown" id="mainTreeDd" onclick="event.stopPropagation()">
                  <div class="tree-toolbar">
                    <div class="search-wrap">
                      <input type="text" id="mainTreeSearch" placeholder="搜索" oninput="renderMainTree()">
                      <span class="ic"><i class="fa-solid fa-magnifying-glass"></i></span>
                    </div>
                  </div>
                  <div class="tree-body" id="mainTreeBody"></div>
                </div>
              </div>
            </div>
            <div class="field">
              <label>促销活动ID</label>
              <input type="text" id="qPromoId" placeholder="请输入活动ID">
            </div>
            <div class="field">
              <label>促销活动名称</label>
              <input type="text" id="qPromoName" placeholder="请输入活动名称">
            </div>
            <div class="field range-field">
              <label>活动时间（UTC-3）</label>
              <div class="range-trigger-wrap">
                <div class="range-trigger" id="rngUtc3Trig" onclick="toggleRangePop(event,'utc3')">
                  <span id="rngUtc3Text">请选择日期</span>
                  <span class="cal-ic"><i class="fa-regular fa-calendar"></i></span>
                </div>
                <div class="range-popover" id="rngUtc3Pop" onclick="event.stopPropagation()">
                  <div class="range-shortcuts" id="rngUtc3Shortcuts"></div>
                  <div class="range-calendars" id="rngUtc3Cals"></div>
                </div>
              </div>
            </div>
            <div class="field range-field">
              <label>活动时间（UTC-8）</label>
              <div class="range-trigger-wrap">
                <div class="range-trigger" id="rngUtc8Trig" onclick="toggleRangePop(event,'utc8')">
                  <span id="rngUtc8Text">请选择日期</span>
                  <span class="cal-ic"><i class="fa-regular fa-calendar"></i></span>
                </div>
                <div class="range-popover" id="rngUtc8Pop" onclick="event.stopPropagation()">
                  <div class="range-shortcuts" id="rngUtc8Shortcuts"></div>
                  <div class="range-calendars" id="rngUtc8Cals"></div>
                </div>
              </div>
            </div>
            <div class="field" style="align-self:flex-end">
              <label>&nbsp;</label>
              <div class="btn-row">
                <button type="button" class="btn btn-primary" onclick="mockSearch()"><i class="fa-solid fa-magnifying-glass"></i> 搜索</button>
                <button type="button" class="btn btn-default" onclick="mockReset()">重置</button>
                <button type="button" class="btn btn-default" onclick="alert('保存快捷键：平台统一能力（占位）')">保存快捷键</button>
              </div>
            </div>
          </div>
          <div class="table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>活动ID</th>
                  <th>活动名称</th>
                  <th>活动类型</th>
                  <th>渠道-商品</th>
                  <th>状态</th>
                  <th>活动时间（UTC-3）</th>
                  <th>活动时间（UTC-8）</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
          <div class="pagination-bar">
            <span id="listPageInfo"></span>
            <div style="display:flex;align-items:center;gap:12px">
              <label>每页 <select id="listPageSize" onchange="listChangeSize()"></select> 条</label>
              <div class="page-btns">
                <button type="button" id="listPrev" onclick="listPrev()">上一页</button>
                <button type="button" id="listNext" onclick="listNext()">下一页</button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="modal-backdrop" id="modalBulk" aria-hidden="true">
    <div class="modal modal-sm" role="dialog">
      <div class="modal-hd"><span id="bulkModalTitle">批量输入渠道</span><button type="button" class="btn btn-default" style="min-width:auto;padding:0 8px;height:28px" onclick="closeModal('modalBulk')"><i class="fa-solid fa-xmark"></i></button></div>
      <div class="modal-bd">
        <p style="font-size:12px;color:var(--text-secondary)">每行一个或逗号分隔，匹配叶子渠道编码。</p>
        <textarea id="bulkTextarea" placeholder="例：&#10;Ozon-Z03001-She&#10;Ozon-Z03002-Yun"></textarea>
      </div>
      <div class="modal-ft">
        <button type="button" class="btn btn-default" onclick="closeModal('modalBulk')">取消</button>
        <button type="button" class="btn btn-primary" onclick="applyBulkModal()">确定</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="modalSku" aria-hidden="true">
    <div class="modal" role="dialog">
      <div class="modal-hd">
        <span>渠道-商品</span>

  <script type="application/json" id="pm-agent-demo-manifest">
{

}
  </script>

  <script>
    const LEAF_IDS = [];
    const CHANNEL_TREE_DEF = [
      { id: 'ozon', label: 'Ozon', children: [
        { id: 'ru', label: '俄罗斯', children: [
          { id: 'Ozon-Z03001-She', label: 'Ozon-Z03001-She' },
          { id: 'Ozon-Z03002-Yun', label: 'Ozon-Z03002-Yun' },
          { id: 'Ozon-Z03003-Hua', label: 'Ozon-Z03003-Hua' },
          { id: 'Ozon-Z03004-Lee', label: 'Ozon-Z03004-Lee' }
        ]}
      ]}
    ];
    (function collectLeaves(nodes, d) {
      nodes.forEach(n => {
        if (n.children) { n.expanded = d < 2; collectLeaves(n.children, d + 1); }
        else { LEAF_IDS.push(n.id); n.leaf = true; }
      });
    })(CHANNEL_TREE_DEF, 0);

    let selectedChannels = new Set();
    let joinSelected = new Set();
    let joinInitialSelected = new Set();
    let bulkTarget = 'main';
    let joinOn = true;
    let currentActivityId = null;

    const rangeState = {
      utc3: { start: null, end: null, anchorMonth: new Date(2026, 3, 1), open: false },
      utc8: { start: null, end: null, anchorMonth: new Date(2026, 3, 1), open: false }
    };

    const ACTIVITY_TYPES = [
      { code: 'STOCK_DISCOUNT', zh: '库存折扣' },
      { code: 'MARKETPLACE_MULTI_LEVEL_DISCOUNT_ON_AMOUNT', zh: '弹性提升' },
      { code: 'SUM_CONDITION', zh: '大型主题促销' }
    ];
    const baseActs = [
      { ru: 'Летняя распродажа 2026', zh: '2026 夏季大促', status: '进行中', utc3: '2026-04-01 ~ 2026-04-30', bj: '2026-04-01 12:00:00 ~ 2026-05-01 11:00:00' },
      { ru: 'Скидка на электронику', zh: '数码品类折扣', status: '未开始', utc3: '2026-05-10 ~ 2026-05-20', bj: '2026-05-10 23:00:00 ~ 2026-05-21 11:00:00' },
      { ru: 'Архивная акция', zh: '已归档活动示例', status: '已结束', utc3: '2026-01-01 ~ 2026-01-15', bj: '2026-01-01 12:00:00 ~ 2026-01-16 11:00:00' }
    ];
    const activities = [];
    for (let i = 0; i < 42; i++) {
      const b = baseActs[i % baseActs.length];
      const typ = ACTIVITY_TYPES[i % ACTIVITY_TYPES.length];
      activities.push({ id: 'P-' + String(10001 + i), ...b, typeCode: typ.code, typeZh: typ.zh });
    }

    const skuRowsByActivity = {};
    activities.forEach(a => {
      skuRowsByActivity[a.id] = LEAF_IDS.map((ch, idx) => ({
        channel: ch,
        joined: 60 + (idx * 7 + a.id.length) % 120,
        canAdd: 20 + idx % 35
      }));
    });

    let listPage = { page: 1, pageSize: 20 };
    let skuModal = { activityId: null, page: 1, pageSize: 20 };

    function fmt(d) {
      if (!d) return '';
      const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
    }
    function parseYMD(s) {
      const p = s.split('-').map(Number);
      return new Date(p[0], p[1] - 1, p[2]);
    }
    function statusClass(s) {
      if (s === '进行中') return 'status-on';
      if (s === '已结束') return 'status-end';
      return 'status-pending';
    }

    function toggleRangePop(ev, key) {
      ev.stopPropagation();
      const st = rangeState[key];
      const wasOpen = st.open;
      closeAllPops();
      st.open = !wasOpen;
      const trig = document.getElementById(key === 'utc3' ? 'rngUtc3Trig' : 'rngUtc8Trig');
      const pop = document.getElementById(key === 'utc3' ? 'rngUtc3Pop' : 'rngUtc8Pop');
      trig.classList.toggle('open', st.open);
      pop.classList.toggle('open', st.open);
      if (st.open) { buildShortcuts(key); renderCalendars(key); }
    }
    function closeAllPops() {
      ['utc3', 'utc8'].forEach(key => {
        rangeState[key].open = false;
        document.getElementById(key === 'utc3' ? 'rngUtc3Trig' : 'rngUtc8Trig').classList.remove('open');
        document.getElementById(key === 'utc3' ? 'rngUtc3Pop' : 'rngUtc8Pop').classList.remove('open');
      });
      document.getElementById('mainTreeDd').classList.remove('open');
      document.getElementById('mainTreeCtrl').classList.remove('open');
      document.getElementById('joinTreeDd').classList.remove('open');
      document.getElementById('joinTreeCtrl').classList.remove('open');
    }
    document.addEventListener('click', closeAllPops);

    function buildShortcuts(key) {
      const el = document.getElementById(key === 'utc3' ? 'rngUtc3Shortcuts' : 'rngUtc8Shortcuts');
      const labels = ['今天', '昨天', '最近3天', '最近7天', '最近30天', '最近90天', '本月', '上月'];
      el.innerHTML = labels.map((t, i) => `<a onclick="event.stopPropagation();applyShortcut('${key}',${i})">${t}</a>`).join('');
    }
    function applyShortcut(key, idx) {
      const st = rangeState[key];
      const t = new Date();
      t.setHours(0, 0, 0, 0);
      let start = new Date(t), end = new Date(t);
      if (idx === 0) { }
      else if (idx === 1) { start.setDate(start.getDate() - 1); end.setDate(end.getDate() - 1); }
      else if (idx === 2) { start.setDate(start.getDate() - 2); }
      else if (idx === 3) { start.setDate(start.getDate() - 6); }
      else if (idx === 4) { start.setDate(start.getDate() - 29); }
      else if (idx === 5) { start.setDate(start.getDate() - 89); }
      else if (idx === 6) { start = new Date(t.getFullYear(), t.getMonth(), 1); end = new Date(t.getFullYear(), t.getMonth() + 1, 0); }
      else if (idx === 7) { start = new Date(t.getFullYear(), t.getMonth() - 1, 1); end = new Date(t.getFullYear(), t.getMonth(), 0); }
      st.start = start;
      st.end = end;
      st.anchorMonth = new Date(start.getFullYear(), start.getMonth(), 1);
      updateRangeText(key);
      renderCalendars(key);
    }
    function updateRangeText(key) {
      const st = rangeState[key];
      const el = document.getElementById(key === 'utc3' ? 'rngUtc3Text' : 'rngUtc8Text');
      if (st.start && st.end) el.textContent = fmt(st.start) + ' → ' + fmt(st.end);
      else if (st.start) el.textContent = fmt(st.start) + ' → 请选择结束';
      else el.textContent = '请选择日期';
    }
    function monthMatrix(anchor) {
      const y = anchor.getFullYear(), m = anchor.getMonth();
      const first = new Date(y, m, 1);
      const startWeekday = (first.getDay() + 6) % 7;
      const gridStart = new Date(y, m, 1 - startWeekday);
      const days = [];
      for (let i = 0; i < 42; i++) {
        const d = new Date(gridStart);
        d.setDate(gridStart.getDate() + i);
        days.push(d);
      }
      return { label: y + ' 年 ' + (m + 1) + ' 月', days, y, m };
    }
    function renderCalendars(key) {
      const st = rangeState[key];
      const host = document.getElementById(key === 'utc3' ? 'rngUtc3Cals' : 'rngUtc8Cals');
      const a0 = new Date(st.anchorMonth.getFullYear(), st.anchorMonth.getMonth(), 1);
      const a1 = new Date(st.anchorMonth.getFullYear(), st.anchorMonth.getMonth() + 1, 1);
      host.innerHTML = [a0, a1].map((anchor, mi) => renderOneMonth(key, anchor, mi)).join('');
    }
    function renderOneMonth(key, anchor, mi) {
      const { label, days, y, m } = monthMatrix(anchor);
      const st = rangeState[key];
      const weeks = ['一', '二', '三', '四', '五', '六', '日'];
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const cells = days.map(d => {
        const other = d.getMonth() !== m;
        let cls = 'cal-day' + (other ? ' other' : '');
        const t0 = st.start ? new Date(st.start.getFullYear(), st.start.getMonth(), st.start.getDate()).getTime() : null;
        const t1 = st.end ? new Date(st.end.getFullYear(), st.end.getMonth(), st.end.getDate()).getTime() : null;
        const dt = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
        if (!other && st.start && st.end && dt >= Math.min(t0, t1) && dt <= Math.max(t0, t1)) cls += ' in-range';
        if (st.start && dt === t0) cls += ' start';
        if (st.end && dt === t1) cls += ' end';
        if (!other && dt === today.getTime()) cls += ' today';
        return `<div class="${cls}" onclick="event.stopPropagation();pickDay('${key}',${d.getFullYear()},${d.getMonth()},${d.getDate()})">${d.getDate()}</div>`;
      }).join('');
      const nav = `<div class="cal-head">
        ${mi === 0 ? `<button type="button" onclick="event.stopPropagation();shiftMonth('${key}',-1)">‹</button>` : `<span></span>`}
        <span>${label}</span>
        ${mi === 1 ? `<button type="button" onclick="event.stopPropagation();shiftMonth('${key}',1)">›</button>` : `<span></span>`}
      </div>`;
      return `<div class="cal-grid">${nav}<div class="cal-weekdays">${weeks.map(w => `<div>${w}</div>`).join('')}</div><div class="cal-days">${cells}</div></div>`;
    }
    function shiftMonth(key, delta) {
      const st = rangeState[key];
      st.anchorMonth = new Date(st.anchorMonth.getFullYear(), st.anchorMonth.getMonth() + delta, 1);
      renderCalendars(key);
    }
    function pickDay(key, y, mo, day) {
      const st = rangeState[key];
      const d = new Date(y, mo, day);
      if (!st.start || (st.start && st.end)) { st.start = d; st.end = null; }
      else {
        if (d < st.start) { st.end = st.start; st.start = d; }
        else st.end = d;
      }
      updateRangeText(key);
      renderCalendars(key);
    }

    function treeMatchesSearch(node, q) {
      if (!q) return true;
      const lq = q.toLowerCase();
      if (node.label.toLowerCase().includes(lq)) return true;
      if (node.children) return node.children.some(c => treeMatchesSearch(c, q));
      return false;
    }
    function renderTreeBody(containerId, tree, selected, searchInputId, expandedSet) {
      const q = (document.getElementById(searchInputId).value || '').trim().toLowerCase();
      const parts = [];
      function walk(nodes, depth) {
        nodes.forEach(node => {
          if (!treeMatchesSearch(node, q)) return;
          const ind = 'tree-indent-' + Math.min(depth, 2);
          const hasCh = !!(node.children && node.children.length);
          const exp = expandedSet.has(node.id);
          const tw = hasCh ? `<span class="tw" onclick="event.stopPropagation();toggleExp('${containerId}','${node.id}')">${exp ? '▼' : '▶'}</span>` : '<span class="tw empty">·</span>';
          const leaf = !hasCh;
          const checked = leaf && selected.has(node.id) ? 'checked' : '';
          const onchg = leaf ? `onchange="event.stopPropagation();toggleLeaf('${containerId}','${node.id}')"` : `onclick="event.stopPropagation();toggleParent('${containerId}','${node.id}')"`;
          parts.push(`<div class="tree-row ${ind}">${tw}<input type="checkbox" class="cb" data-id="${node.id}" data-leaf="${leaf}" ${checked} ${leaf ? onchg : ''}> <span style="flex:1">${node.label}</span></div>`);
          if (hasCh && exp) walk(node.children, depth + 1);
        });
      }
      walk(tree, 0);
      document.getElementById(containerId).innerHTML = parts.join('') || '<div class="hint" style="padding:12px;color:#999">无匹配项</div>';
    }
    const expandedMain = new Set(['ozon', 'ru']);
    const expandedJoin = new Set(['ozon', 'ru']);
    function toggleExp(containerId, id) {
      const set = containerId === 'mainTreeBody' ? expandedMain : expandedJoin;
      if (set.has(id)) set.delete(id); else set.add(id);
      if (containerId === 'mainTreeBody') renderMainTree(); else renderJoinTree();
    }
    function toggleLeaf(containerId, id) {
      const sel = containerId === 'mainTreeBody' ? selectedChannels : joinSelected;
      const el = document.querySelector(`#${containerId} input[data-id="${id}"]`);
      if (el && el.checked) sel.add(id); else sel.delete(id);
      if (containerId === 'mainTreeBody') syncMainSummary(); else { syncJoinSummary(); updateJoinChannelDeltaHint(); }
    }
    function toggleParent(containerId, pid) {
      const leaves = [];
      function collect(n) {
        if (n.children) n.children.forEach(collect);
        else leaves.push(n.id);
      }
      function find(nodes) {
        for (const n of nodes) {
          if (n.id === pid) { collect(n); return; }
          if (n.children) find(n.children);
        }
      }
      find(CHANNEL_TREE_DEF);
      const sel = containerId === 'mainTreeBody' ? selectedChannels : joinSelected;
      const allOn = leaves.every(id => sel.has(id));
      leaves.forEach(id => { if (allOn) sel.delete(id); else sel.add(id); });
      if (containerId === 'mainTreeBody') renderMainTree(); else renderJoinTree();
      if (containerId === 'mainTreeBody') syncMainSummary(); else { syncJoinSummary(); updateJoinChannelDeltaHint(); }
    }
    function renderMainTree() { renderTreeBody('mainTreeBody', CHANNEL_TREE_DEF, selectedChannels, 'mainTreeSearch', expandedMain); }
    function renderJoinTree() { renderTreeBody('joinTreeBody', CHANNEL_TREE_DEF, joinSelected, 'joinTreeSearch', expandedJoin); }
    function syncMainSummary() {
      const el = document.getElementById('mainTreeSummary');
      if (selectedChannels.size) { el.textContent = Array.from(selectedChannels).join('，'); el.classList.add('has-val'); }
      else { el.textContent = '请选择渠道'; el.classList.remove('has-val'); }
    }
    function syncJoinSummary() {
      const el = document.getElementById('joinTreeSummary');
      if (joinSelected.size) { el.textContent = Array.from(joinSelected).join('，'); el.classList.add('has-val'); }
      else { el.textContent = '请选择渠道'; el.classList.remove('has-val'); }
    }
    function toggleMainTree(ev) {
      ev.stopPropagation();
      const dd = document.getElementById('mainTreeDd');
      const ctrl = document.getElementById('mainTreeCtrl');
      const willOpen = !dd.classList.contains('open');
      closeAllPops();
      if (willOpen) {
        dd.classList.add('open');
        ctrl.classList.add('open');
        renderMainTree();
      }
    }
    function toggleJoinTree(ev) {
      if (!joinOn) return;
      ev.stopPropagation();
      const dd = document.getElementById('joinTreeDd');
      const ctrl = document.getElementById('joinTreeCtrl');
      const willOpen = !dd.classList.contains('open');
      closeAllPops();
      if (willOpen) {
        dd.classList.add('open');
        ctrl.classList.add('open');
        renderJoinTree();
      }
    }
    function openBulkModal(target) {
      bulkTarget = target;
      document.getElementById('bulkModalTitle').textContent = target === 'main' ? '批量输入渠道' : '批量输入渠道（加促）';
      document.getElementById('bulkTextarea').value = '';
      document.getElementById('modalBulk').classList.add('show');
    }
    function applyBulkModal() {
      const raw = document.getElementById('bulkTextarea').value;
      const parts = raw.split(/[\n,，;；\s]+/).map(s => s.trim()).filter(Boolean);
      const sel = bulkTarget === 'main' ? selectedChannels : joinSelected;
      parts.forEach(p => { if (LEAF_IDS.includes(p)) sel.add(p); });
      if (bulkTarget === 'main') { renderMainTree(); syncMainSummary(); }
      else { renderJoinTree(); syncJoinSummary(); updateJoinChannelDeltaHint(); }
      closeModal('modalBulk');
    }

    function fillPageSizeSelect(selId, val) {
      const sel = document.getElementById(selId);
      sel.innerHTML = [10, 20, 50, 100, 200, 500].map(n => `<option value="${n}" ${n === val ? 'selected' : ''}>${n}</option>`).join('');
    }
    function renderListTable() {
      const total = activities.length;
      const maxPage = Math.max(1, Math.ceil(total / listPage.pageSize));
      if (listPage.page > maxPage) listPage.page = maxPage;
      const start = (listPage.page - 1) * listPage.pageSize;
      const slice = activities.slice(start, start + listPage.pageSize);
      document.getElementById('tableBody').innerHTML = slice.map(a => `
        <tr>
          <td>${a.id}</td>
          <td><div class="name-ru">${a.ru}</div><div class="name-zh">${a.zh}</div></td>
          <td><span class="act-type-zh">${a.typeZh}</span></td>
          <td><a class="link" href="javascript:void(0)" onclick="openSkuModal('${a.id}')">查看</a></td>
          <td><span class="status-tag ${statusClass(a.status)}">${a.status}</span></td>
          <td>${a.utc3}</td>
          <td style="font-size:12px">${a.bj}</td>
          <td><a class="link" href="javascript:void(0)" onclick="openJoinModal('${a.id}')">加促管理</a></td>
        </tr>`).join('');
      document.getElementById('listPageInfo').textContent = `第 ${listPage.page} / ${maxPage} 页，共 ${total} 条`;
      document.getElementById('listPrev').disabled = listPage.page <= 1;
      document.getElementById('listNext').disabled = listPage.page >= maxPage;
    }
    function listChangeSize() {
      listPage.pageSize = +document.getElementById('listPageSize').value;
      listPage.page = 1;
      renderListTable();
    }
    function listPrev() { if (listPage.page > 1) { listPage.page--; renderListTable(); } }
    function listNext() {
      const maxPage = Math.max(1, Math.ceil(activities.length / listPage.pageSize));
      if (listPage.page < maxPage) { listPage.page++; renderListTable(); }
    }

    function openSkuModal(activityId) {
      currentActivityId = activityId;
      skuModal = { activityId, page: 1, pageSize: 20 };
      document.getElementById('modalSkuTitle').textContent = '当前活动：' + activityId;
      fillPageSizeSelect('skuPageSize', skuModal.pageSize);
      renderSkuModal();
      document.getElementById('modalSku').classList.add('show');
    }
    function skuChangeSize() {
      skuModal.pageSize = +document.getElementById('skuPageSize').value;
      skuModal.page = 1;
      renderSkuModal();
    }
    function skuPrev() { if (skuModal.page > 1) { skuModal.page--; renderSkuModal(); } }
    function skuNext() {
      const rows = skuRowsByActivity[skuModal.activityId] || [];
      const maxPage = Math.max(1, Math.ceil(rows.length / skuModal.pageSize));
      if (skuModal.page < maxPage) { skuModal.page++; renderSkuModal(); }
    }
    function renderSkuModal() {
      const rows = skuRowsByActivity[skuModal.activityId] || [];
      const start = (skuModal.page - 1) * skuModal.pageSize;
      const slice = rows.slice(start, start + skuModal.pageSize);
      document.getElementById('modalSkuBody').innerHTML = slice.map(r =>
        `<tr><td>${r.channel}</td><td>${r.joined}</td><td>${r.canAdd}</td></tr>`).join('');
      const total = rows.length;
      const maxPage = Math.max(1, Math.ceil(total / skuModal.pageSize));
      document.getElementById('skuPageInfo').textContent = `第 ${skuModal.page} / ${maxPage} 页，共 ${total} 条`;
      document.getElementById('skuPrev').disabled = skuModal.page <= 1;
      document.getElementById('skuNext').disabled = skuModal.page >= maxPage;
    }
    function closeModal(id) { document.getElementById(id).classList.remove('show'); }
    function updateJoinChannelDeltaHint() {
      const box = document.getElementById('joinChannelDeltaHint');
      if (!box) return;
      if (!joinOn) {
        box.style.display = 'none';
        box.innerHTML = '';
        return;
      }
      const added = [...joinSelected].filter(id => !joinInitialSelected.has(id));
      const removed = [...joinInitialSelected].filter(id => !joinSelected.has(id));
      const pid = currentActivityId || '—';
      const parts = [];
      if (added.length) {
        parts.push('您当前将渠道【' + added.join('、') + '】加入促销活动【' + pid + '】，满足条件的商品我们将加入到自动促销列表');
      }
      if (removed.length) {
        parts.push('将渠道【' + removed.join('、') + '】从活动中去除，渠道下已参加该活动的商品我们将自动退出促销活动【' + pid + '】');
      }
      if (parts.length) {
        box.style.display = 'block';
        box.innerHTML = '<div class="join-risk-title">渠道变更说明</div><p style="margin:6px 0 0 0">' + parts.join('；') + '。</p>';
      } else {
        box.style.display = 'none';
        box.innerHTML = '';
      }
    }
    function closeJoinModalAll() {
      closeModal('modalJoinConfirm');
      closeModal('modalJoin');
    }

    function openJoinModal(activityId) {
      currentActivityId = activityId;
      joinInitialSelected = new Set(LEAF_IDS);
      joinSelected = new Set(LEAF_IDS);
      joinOn = true;
      const sw = document.getElementById('joinSwitch');
      sw.classList.add('on');
      document.getElementById('joinChannelField').classList.remove('disabled');
      document.getElementById('joinSwitchHint').textContent = '默认开启；关闭后渠道筛选禁用';
      document.getElementById('joinPromoIdReadonly').textContent = activityId;
      syncJoinSummary();
      renderJoinTree();
      updateJoinChannelDeltaHint();
      closeModal('modalJoinConfirm');
      document.getElementById('modalJoin').classList.add('show');
    }
    function toggleJoinSwitch() {
      joinOn = !joinOn;
      document.getElementById('joinSwitch').classList.toggle('on', joinOn);
      document.getElementById('joinChannelField').classList.toggle('disabled', !joinOn);
      document.getElementById('joinSwitchHint').textContent = joinOn ? '默认开启；关闭后渠道筛选禁用' : '已关闭加促；渠道筛选已禁用';
      document.getElementById('joinTreeDd').classList.remove('open');
      updateJoinChannelDeltaHint();
    }
    function submitJoin() {
      const msgEl = document.getElementById('joinConfirmMsg');
      if (!joinOn) {
        msgEl.textContent = '确认是否要将促销ID关闭？关闭后，所有渠道不参与该促销活动';
      } else {
        msgEl.textContent = '确认是否要将账号移除/加入到促销ID中';
      }
      document.getElementById('modalJoinConfirm').classList.add('show');
    }
    function confirmJoinSubmit() {
      const action = joinOn ? '加促' : '退促（开关关闭）';
      const ch = joinOn ? Array.from(joinSelected).join('、') || '（未选渠道）' : '（渠道筛选已禁用）';
      alert(`已提交：活动 ${currentActivityId}\n${action}\n渠道：${ch}`);
      closeModal('modalJoinConfirm');
      closeModal('modalJoin');
    }

    function mockSearch() { alert('原型：携带筛选条件请求列表'); }
    function mockReset() {
      selectedChannels.clear();
      joinSelected.clear();
      document.getElementById('qPromoId').value = '';
      document.getElementById('qPromoName').value = '';
      document.getElementById('mainTreeSearch').value = '';
      ['utc3', 'utc8'].forEach(k => { rangeState[k].start = null; rangeState[k].end = null; updateRangeText(k); });
      listPage.page = 1;
      syncMainSummary();
      renderMainTree();
      renderListTable();
    }

    fillPageSizeSelect('listPageSize', listPage.pageSize);
    renderListTable();
    ['rngUtc3Pop', 'rngUtc8Pop'].forEach(id => document.getElementById(id).addEventListener('click', e => e.stopPropagation()));
    rangeState.utc3.start = new Date(2026, 3, 16);
    rangeState.utc3.end = new Date(2026, 3, 23);
    updateRangeText('utc3');
    updateRangeText('utc8');
  </script>
</body>
</html>
